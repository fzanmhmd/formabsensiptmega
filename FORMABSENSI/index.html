<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="jpg" href="mega.jpg">
    <title>Absensi PT.MEGA PRIMATAMA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.0/css/all.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
    <header>
        <img src="mega.jpg" alt="logopt">
        <h1>PT.MEGA PRIMATAMA</h1>
    </header>
    <main>
        <form>
            <div class="forminput">
                <input type="text" name="Nama" placeholder=" " required>
                <span>Nama</span>
            </div>
            <div class="forminput">
                <input type="tel" name="noabsen" placeholder=" " required>
                <span>No Absen</span>
            </div>
            <div class="forminput">
                <input type="text" id="tanggal" placeholder=" ">
                <span>Tanggal</span>
            </div>
            <div class="forminput" >
                <select id="shift">
                    <option value="">Shift :</option>
                    <option>PAGI</option>
                    <option>SIANG</option>
                    <option>MALAM</option>
                </select>
            </div>
            <div class="forminput" >
                <label for="masuk">Masuk :</label>
                <input type="time" id="masuk" name="masuk">
                <label for="pulang">Pulang :</label>
                <input type="time" id="pulang" name="pulang">
            </div>
            <div class="forminput">
                <label for="upload">Upload Foto : </label>
                <input type="file" id="myfile" name="upload">
                <p><i>*menggunakan timestamp</i></p>
            </div>
            <button type="submit" id="kirimformabsen">Kirim</button>
        </form>  
    </main>

    <footer>
        <hr>
        <div class="social">
            <a href="https://www.instagram.com/fzannmhd" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://github.com/fzanmhmd" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/muhammad-fauzan-9b80103b2/" target="_blank"><i class="fab fa-linkedin"></i></a>
        </div>
        <p>&copy;2026 MFauzan. All rights reserved.</p>   
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="script.js"></script>
</script>
</body>
</html>
